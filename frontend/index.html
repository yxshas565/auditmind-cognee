<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AuditMind</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --bg: #07070b;
    --panel: #0e0e16;
    --panel2: #14141f;
    --border: #232332;
    --accent: #8b5cf6;
    --accent2: #06b6d4;
    --accent-glow: #8b5cf655;
    --text: #f1f1f7;
    --text-dim: #75758f;
    --ai-bubble: #15151f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 20% 20%, #1a0f2e 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #0a1f2e 0%, transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  .panel { display: flex; flex-direction: column; height: 100vh; }
  .chat-panel {
    width: 38%;
    border-right: 1px solid var(--border);
    background: linear-gradient(180deg, var(--panel) 0%, #0a0a12 100%);
    position: relative;
  }
  .trace-panel { width: 62%; position: relative; }

  header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(10px);
  }
  .logo-dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 16px var(--accent-glow);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px var(--accent-glow); }
    50% { box-shadow: 0 0 22px var(--accent-glow), 0 0 8px var(--accent2); }
  }
  header h1 {
    font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
    background: linear-gradient(90deg, #fff, #c4b5fd);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .sub { font-size: 10.5px; color: var(--text-dim); margin-left: auto; letter-spacing: 0.5px; text-transform: uppercase; }

  .messages { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    max-width: 86%;
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.5;
    animation: msgIn 0.35s cubic-bezier(.2,.8,.2,1);
    position: relative;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px -4px var(--accent-glow);
  }
  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .msg.ai:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 18px -8px var(--accent-glow); }
  .msg.ai.active { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2); }
  .msg.system {
    align-self: center;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 11.5px;
    padding: 7px 14px;
  }
  .msg.ai .hint {
    display: flex; align-items: center; gap: 5px;
    margin-top: 8px; font-size: 10px; color: var(--accent2); opacity: 0.85; letter-spacing: 0.3px;
  }
  .hint-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); animation: pulse 1.6s infinite; }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }

  .memory-row { display: flex; gap: 8px; padding: 0 18px 14px; }
  .input-row { padding: 16px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  input[type=text] {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 15px;
    border-radius: 12px;
    font-size: 13.5px;
    outline: none;
    transition: all 0.2s;
  }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  button {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white; border: none; padding: 0 20px; border-radius: 12px;
    cursor: pointer; font-size: 13.5px; font-weight: 600;
    transition: all 0.2s;
  }
  button:hover { filter: brightness(1.15); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.35; cursor: default; transform: none; }
  .memory-row button { background: var(--panel2); border: 1px solid var(--border); color: var(--text-dim); font-size: 11.5px; padding: 0 14px; }
  .memory-row button:hover { border-color: var(--accent2); color: var(--text); filter: none; }
  .memory-row input { font-size: 12px; padding: 9px 12px; }

  .trace-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
  .trace-header h2 { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; }
  .trace-stats { font-size: 11.5px; color: var(--text-dim); margin-top: 5px; }
  .trace-stats b { color: var(--accent2); font-weight: 700; }
  .legend { display: flex; gap: 14px; font-size: 10px; color: var(--text-dim); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .sw { width: 8px; height: 8px; border-radius: 50%; }

  #graph-container { width: 100%; height: calc(100% - 66px); position: relative; }
  .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-dim); }
  .empty-state .icon { font-size: 38px; margin-bottom: 12px; opacity: 0.3; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .empty-state .label { font-size: 13px; }

  .node-label { fill: var(--text); font-size: 10.5px; font-weight: 600; pointer-events: none; text-anchor: middle; }
  .node-label.dim { fill: var(--text-dim); font-size: 8.5px; font-weight: 400; }
  .link { stroke: #2d2d42; stroke-width: 1.6; }
  .link-label { fill: #4a4a66; font-size: 8px; pointer-events: none; }

  .tooltip {
    position: absolute; background: var(--panel2); border: 1px solid var(--accent);
    padding: 9px 12px; border-radius: 8px; font-size: 11.5px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; z-index: 10; max-width: 220px;
    box-shadow: 0 8px 24px -8px black;
  }
  .tooltip b { color: var(--accent2); }

  .zoom-controls { position: absolute; bottom: 18px; right: 18px; display: flex; flex-direction: column; gap: 6px; }
  .zoom-controls button { width: 32px; height: 32px; padding: 0; border-radius: 8px; font-size: 16px; background: var(--panel2); border: 1px solid var(--border); color: var(--text-dim); }
  .zoom-controls button:hover { color: var(--text); border-color: var(--accent); filter: none; }
</style>
</head>
<body>

<div class="panel chat-panel">
  <header>
    <div class="logo-dot"></div>
    <h1>AuditMind</h1>
    <span class="sub">traceable memory</span>
  </header>
  <div class="messages" id="messages"></div>
  <div class="memory-row">
    <input type="text" id="memInput" placeholder="Add a memory (fact)..." onkeydown="if(event.key==='Enter')addMemory()" />
    <button onclick="addMemory()">+ Remember</button>
  </div>
  <div class="input-row">
    <input type="text" id="chatInput" placeholder="Ask something..." onkeydown="if(event.key==='Enter')sendChat()" />
    <button onclick="sendChat()" id="sendBtn">Ask</button>
  </div>
</div>

<div class="panel trace-panel">
  <div class="trace-header">
    <div>
      <h2>Memory Trace</h2>
      <div class="trace-stats" id="traceStats">Ask a question to see which memories drove the answer</div>
    </div>
    <div class="legend">
      <span><i class="sw" style="background:#8b5cf6"></i>Entity</span>
      <span><i class="sw" style="background:#06b6d4"></i>Type</span>
      <span><i class="sw" style="background:#4ade80"></i>Document</span>
    </div>
  </div>
  <div id="graph-container">
    <div class="empty-state" id="emptyState">
      <div class="icon">◎</div>
      <div class="label">No trace yet — ask a question</div>
    </div>
  </div>
  <div class="zoom-controls">
    <button onclick="zoomBy(1.3)">+</button>
    <button onclick="zoomBy(0.7)">−</button>
    <button onclick="resetZoom()">⊙</button>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const API = "http://127.0.0.1:8000";
let zoomBehavior, svgRoot;

function addMsg(text, who) {
  const m = document.createElement('div');
  m.className = 'msg ' + who;
  m.textContent = text;
  document.getElementById('messages').appendChild(m);
  document.getElementById('messages').scrollTop = 1e9;
  return m;
}

function addTyping() {
  const m = document.createElement('div');
  m.className = 'msg ai';
  m.id = 'typingMsg';
  m.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('messages').appendChild(m);
  document.getElementById('messages').scrollTop = 1e9;
}
function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

async function addMemory() {
  const input = document.getElementById('memInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    const res = await fetch(API + '/memory', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text})
    });
    if (!res.ok) throw new Error();
    addMsg('🧠 ' + text, 'system');
  } catch (e) {
    addMsg('⚠️ Failed to store memory.', 'system');
  }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  addTyping();

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    removeTyping();
    const aiMsg = addMsg(data.answer, 'ai');
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.innerHTML = '<span class="hint-dot"></span> view memory trace';
    aiMsg.appendChild(hint);
    aiMsg.onclick = () => {
      document.querySelectorAll('.msg.ai').forEach(m => m.classList.remove('active'));
      aiMsg.classList.add('active');
      loadTrace(data.response_id);
    };
    aiMsg.click();
  } catch (e) {
    removeTyping();
    addMsg('⚠️ Something went wrong.', 'ai');
  } finally {
    btn.disabled = false;
  }
}

async function loadTrace(responseId) {
  const res = await fetch(API + '/trace/' + responseId);
  const data = await res.json();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('traceStats').innerHTML =
    `Showing <b>${data.filtered_node_count}</b> of <b>${data.full_graph_node_count}</b> memory nodes for this answer`;
  renderGraph(data.nodes, data.edges);
}

function zoomBy(factor) {
  if (svgRoot && zoomBehavior) svgRoot.transition().duration(250).call(zoomBehavior.scaleBy, factor);
}
function resetZoom() {
  if (svgRoot && zoomBehavior) svgRoot.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);
}

function renderGraph(nodes, edges) {
  const container = document.getElementById('graph-container');
  container.querySelectorAll('svg').forEach(s => s.remove());

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select('#graph-container').append('svg').attr('width', width).attr('height', height);
  svgRoot = svg;
  const g = svg.append('g');

  zoomBehavior = d3.zoom().scaleExtent([0.3, 4]).on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoomBehavior);

  const links = edges.map(e => ({source: e.source, target: e.target, relation: e.relation}));

  const colorFor = (type) => ({
    Entity: '#8b5cf6', EntityType: '#06b6d4', TextDocument: '#4ade80',
    DocumentChunk: '#fbbf24', TextSummary: '#38bdf8', User: '#f87171', Dataset: '#a78bfa'
  }[type] || '#75758f');

  const sizeFor = (type) => ({ Entity: 11, EntityType: 7, TextDocument: 8 }[type] || 7);

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(75).strength(0.9))
    .force('charge', d3.forceManyBody().strength(-160))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide(30))
    .force('x', d3.forceX(width / 2).strength(0.06))
    .force('y', d3.forceY(height / 2).strength(0.06));

  const link = g.append('g').selectAll('line').data(links).join('line').attr('class', 'link').style('opacity', 0)
    .transition().duration(500).style('opacity', 1).selection();

  const linkLabel = g.append('g').selectAll('text').data(links).join('text').attr('class', 'link-label').text(d => d.relation);

  const node = g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', 0).attr('fill', d => colorFor(d.type)).attr('stroke', '#07070b').attr('stroke-width', 2)
    .style('cursor', 'pointer').style('filter', d => d.type === 'Entity' ? 'drop-shadow(0 0 6px ' + colorFor(d.type) + ')' : 'none')
    .call(drag(sim));
  node.transition().duration(500).delay((d, i) => i * 25).attr('r', d => sizeFor(d.type));

  const label = g.append('g').selectAll('text').data(nodes).join('text')
    .attr('class', d => 'node-label' + (d.type === 'Entity' ? '' : ' dim'))
    .text(d => (d.name || '').slice(0, 20)).attr('dy', -14).style('opacity', 0)
    .transition().duration(500).delay((d, i) => i * 25 + 200).style('opacity', 1).selection();

  const tooltip = d3.select('#tooltip');
  node.on('mouseover', function(event, d) {
    d3.select(this).attr('stroke', colorFor(d.type)).attr('stroke-width', 3);
    tooltip.style('opacity', 1).html(`<b>${d.type}</b><br>${d.name}`)
      .style('left', (event.pageX + 14) + 'px').style('top', (event.pageY - 10) + 'px');
  }).on('mouseout', function(event, d) {
    d3.select(this).attr('stroke', '#07070b').attr('stroke-width', 2);
    tooltip.style('opacity', 0);
  });

  sim.on('tick', () => {
    nodes.forEach(d => {
      d.x = Math.max(20, Math.min(width - 20, d.x));
      d.y = Math.max(20, Math.min(height - 20, d.y));
    });
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkLabel.attr('x', d => (d.source.x + d.target.x) / 2).attr('y', d => (d.source.y + d.target.y) / 2);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
    label.attr('x', d => d.x).attr('y', d => d.y);
  });

  setTimeout(() => { if (sim.alpha() < 0.05) sim.alpha(0.3).restart(); }, 600);

  function drag(simulation) {
    function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
    function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
    function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
    return d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended);
  }
}
</script>
</body>
</html>
